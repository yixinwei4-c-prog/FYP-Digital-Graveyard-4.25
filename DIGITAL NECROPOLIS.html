        class ErrorBoundary extends React.Component {
            constructor(props) {

        const clampThemeColor = (hex, minSat = 0.55, minLight = 0.45) => {
            try {
                if (!hex || typeof hex !== 'string') return '#00ff88';
                let h = hex.trim();
                if (!h.startsWith('#')) h = `#${h}`;
                if (!/^#([0-9a-fA-F]{6})$/.test(h)) return '#00ff88';
                const r = parseInt(h.slice(1, 3), 16) / 255;
                const g = parseInt(h.slice(3, 5), 16) / 255;
                const b = parseInt(h.slice(5, 7), 16) / 255;
                const max = Math.max(r, g, b), min = Math.min(r, g, b);
                let hh = 0, ss = 0;
                const ll = (max + min) / 2;
                const d = max - min;
                if (d !== 0) {
                    ss = d / (1 - Math.abs(2 * ll - 1));
                    switch (max) {
                        case r: hh = ((g - b) / d) % 6; break;
                        case g: hh = (b - r) / d + 2; break;
                        default: hh = (r - g) / d + 4; break;
                    }
                    hh *= 60;
                    if (hh < 0) hh += 360;

                const sat = Math.max(ss, minSat);
                const light = Math.max(ll, minLight);

                const c = (1 - Math.abs(2 * light - 1)) * sat;
                const x = c * (1 - Math.abs((hh / 60) % 2 - 1));
                const m = light - c / 2;
                let rr = 0, gg = 0, bb = 0;

                const R = Math.round((rr + m) * 255);

                const B = Math.round((bb + m) * 255);

                    ctx.font = `${config.fontWeight} ${config.fontSize}px ${config.fontFamily}`;
                    const charWidth = ctx.measureText('0').width + 4;

                    columns = Math.ceil(width / charWidth);
                    rows = Math.ceil(height / lineHeight);

                    initHighlighters();

                    grid = [];
                    const charSet = "0123456789ABCDEF";
                    for (let y = 0; y < rows; y++) {
                        let row = [];
                        for (let x = 0; x < columns; x++) {
                            row.push(charSet[Math.floor(Math.random() * charSet.length)]);
                        }

                    }

                        y: y !== null ? y : Math.floor(Math.random() * rows),
                        level: levelKey,
                        speed: levelData.speed,
                        opacity: levelData.opacity,
                        lastMoveTime: performance.now()
                    };
                };

                const initHighlighters = () => {
                    highlighters = [];
                    const count = Math.floor(rows * config.density);
                    for (let i = 0; i < count; i++) {

                    }

                const draw = (timestamp) => {
                    ctx.fillStyle = "#000000";
                    ctx.fillRect(0, 0, width, height);

                    ctx.font = `${config.fontWeight} ${config.fontSize}px ${config.fontFamily}`;
                    ctx.textBaseline = "middle";

                    for (let y = 0; y < rows; y++) {
                        for (let x = 0; x < columns; x++) {
                            const char = grid[y][x];
                            const posY = y * lineHeight + (lineHeight / 2);
                            ctx.fillText(char, x * charWidth + 2, posY);
                        }
                    }

                        .replace(/\u0000/g, '')
                        .replace(/[^\S\r\n]+/g, ' ')
                        .replace(/\r\n/g, '\n')
                        .replace(/\n{3,}/g, '\n\n')
                        .replace(/[\u0001-\u0008\u000B\u000C\u000E-\u001F]/g, '')
                        .trim();
                    return cleaned;

                    return '';
                }
            };

                    if (!docXmlFile) return '';
                    const xmlText = await docXmlFile.async('string');
                    const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
                    const nodes = Array.from(xml.getElementsByTagName('w:t'));
                    const text = nodes.map(n => n.textContent || '').join('');
                    return String(text || '').replace(/\s+\n/g, '\n').replace(/\n{3,}/g, '\n\n').trim();

                                <div className="p-8">
                                    <div className="border border-[#00ff88]/30 bg-[#00ff88]/5 p-6 relative">
                                        <div className="absolute top-0 left-0 w-1 h-full bg-[#00ff88]/40" />
                                        <div className="text-[0.7rem] text-[#88ffaa] dn-hint-mono leading-relaxed whitespace-pre-wrap max-h-[60vh] overflow-y-auto custom-scrollbar opacity-95">
                                            {activeGhost.originalContent || ''}
                                        </div>
                                    </div>
                                    <div className="mt-6 flex justify-end">
                                        <button type="button" onClick={() => setIsStoryVisible(false)} className="relative z-30 px-8 py-3 border border-[#00ff88]/40 text-[#00ff88] uppercase font-black tracking-[0.3em] text-[0.6rem] hover:bg-[#00ff88] hover:text-black transition-all dn-hint-mono">
                                            Close
                                        </button>
                                    </div>
                                </div>
                            </div>
                            </div>
                        </div>
                    )}
                    <div className="absolute bottom-10 left-10 text-left pointer-events-none hidden lg:block">
                        <div className="flex gap-10 justify-start text-[0.5rem] font-black tracking-[0.4em] text-white/20 uppercase">
                            <div className="flex items-center gap-3"><span className="text-white/40 bg-white/5 px-2 py-1 border border-white/10 font-mono">WASD</span><span>Move</span></div>
                            <div className="flex items-center gap-3"><span className="text-white/40 bg-white/5 px-2 py-1 border border-white/10 font-mono">QE</span><span>Altitude</span></div>
                            <div className="flex items-center gap-3"><span className="text-white/40 bg-white/5 px-2 py-1 border border-white/10 font-mono">ZC</span><span>Rotation</span></div>
                            <div className="flex items-center gap-3"><span className="text-white/40 bg-white/5 px-2 py-1 border border-white/10 font-mono">LMB</span><span>Interact</span></div></div></div>
                </div>
            );
        };

        // --- TOMBSTONE GENERATION ANIMATION (VIDEO-BASED) ---
        const VIDEO_MAP = { CLASSIC: '/generatemp4/original.mp4', OBELISK: '/generatemp4/obelisk.mp4', CELTIC: '/generatemp4/celtic.mp4', SLAB: '/generatemp4/slab.mp4' };

        const TombstoneGenerationAnimation = ({ data, aiResult, onComplete }) => {
            const videoRef = useRef(null);
            const onCompleteRef = useRef(onComplete);
            useEffect(() => { onCompleteRef.current = onComplete; });

            const [phase, setPhase] = useState('analyzing'); // 'analyzing' | 'result' | 'done'
            const [progress, setProgress] = useState(0);

            const style = data.tombstoneStyle || 'CLASSIC';
            const videoSrc = VIDEO_MAP[style] || VIDEO_MAP.CLASSIC;

            // Video ended = minimum animation time reached
            const handleVideoEnd = () => {
                // If AI result already arrived, go straight to result phase
                if (aiResult) setPhase('result');
                // Otherwise video loops until AI returns
            };

            // When aiResult arrives
            useEffect(() => {
                if (!aiResult) return;
                if (phase === 'analyzing') {
                    // Let video finish current playback, then show result
                    if (videoRef.current) {
                        videoRef.current.loop = false; // stop looping
                    }
                    setPhase('result');
                }
            }, [aiResult]);

            // When phase becomes 'result', show epitaph for 2.5s then complete
            useEffect(() => {
                if (phase !== 'result') return;
                const timer = setTimeout(() => {
                    setPhase('done');
                    onCompleteRef.current();
                }, 2500);
                return () => clearTimeout(timer);
            }, [phase]);

            // Ensure video plays + track progress
            useEffect(() => {
                const v = videoRef.current;
                if (!v) return;
                // Force play (some browsers block autoplay)
                v.play().catch(() => {});
                const onTime = () => {
                    if (v.duration) setProgress(v.currentTime / v.duration);
                };
                v.addEventListener('timeupdate', onTime);
                return () => v.removeEventListener('timeupdate', onTime);
            }, []);

            const styleLabels = { CLASSIC: 'CLASSIC ARCH', OBELISK: 'OBELISK PILLAR', CELTIC: 'CELTIC CROSS', SLAB: 'HORIZONTAL SLAB' };

            return (
                <div className="fixed inset-0 z-[300] bg-black flex items-center justify-center" style={{ fontFamily: "'Courier New', Courier, monospace" }}>

                    {/* Scanline overlay */}
                    <div style={{
                        position: 'absolute', inset: 0, zIndex: 2, pointerEvents: 'none',
                        background: 'repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px)',
                    }} />

                    {/* Corner decorations */}
                    <div style={{ position:'absolute', top:16, left:16, zIndex:3 }}>
                        <div style={{ width:40, height:40, borderTop:'1px solid #00ff88', borderLeft:'1px solid #00ff88', opacity:0.4 }} />
                    </div>
                    <div style={{ position:'absolute', top:16, right:16, zIndex:3 }}>
                        <div style={{ width:40, height:40, borderTop:'1px solid #00ff88', borderRight:'1px solid #00ff88', opacity:0.4 }} />
                    </div>
                    <div style={{ position:'absolute', bottom:16, left:16, zIndex:3 }}>
                        <div style={{ width:40, height:40, borderBottom:'1px solid #00ff88', borderLeft:'1px solid #00ff88', opacity:0.4 }} />
                    </div>
                    <div style={{ position:'absolute', bottom:16, right:16, zIndex:3 }}>
                        <div style={{ width:40, height:40, borderBottom:'1px solid #00ff88', borderRight:'1px solid #00ff88', opacity:0.4 }} />
                    </div>

                    {/* Top status bar */}
                    <div style={{
                        position:'absolute', top:0, left:0, right:0, zIndex:3,
                        display:'flex', justifyContent:'space-between', alignItems:'center',
                        padding:'20px 32px', color:'#00ff88', fontSize:'10px', letterSpacing:'3px',
                        textTransform:'uppercase', opacity: 0.6,
                    }}>
                        <span>DIGITAL NECROPOLIS</span>
                        <span>{styleLabels[style] || style}</span>
                    </div>

                    {/* Center: Video container with border frame */}
                    <div style={{
                        position:'relative', zIndex:1, width:'min(70vw, 800px)', maxHeight:'70vh',
                        border:'1px solid rgba(0,255,136,0.2)',
                        boxShadow:'0 0 60px rgba(0,255,136,0.05), inset 0 0 60px rgba(0,0,0,0.5)',
                    }}>
                        <video
                            ref={videoRef}
                            src={videoSrc}
                            autoPlay
                            muted
                            loop
                            playsInline
                            onEnded={handleVideoEnd}
                            style={{ width:'100%', height:'100%', objectFit:'contain', display:'block', background:'#000' }}
                        />
                    </div>

                    {/* Bottom: Status text + progress */}
                    <div style={{
                        position:'absolute', bottom:0, left:0, right:0, zIndex:3,
                        padding:'0 32px 24px', color:'#00ff88',
                    }}>
                        {/* Progress bar */}
                        <div style={{
                            width:'100%', height:'1px', background:'rgba(0,255,136,0.15)', marginBottom:'16px',
                            position:'relative', overflow:'hidden',
                        }}>
                            <div style={{
                                position:'absolute', top:0, left:0, height:'100%',
                                width: phase === 'result' || phase === 'done' ? '100%' : (progress * 100) + '%',
                                background:'#00ff88', transition: phase === 'result' ? 'width 0.5s' : 'none',
                                boxShadow:'0 0 8px #00ff88',
                            }} />
                        </div>

                        {/* Status text */}
                        <div style={{
                            display:'flex', justifyContent:'space-between', alignItems:'flex-end',
                            fontSize:'10px', letterSpacing:'3px', textTransform:'uppercase',
                        }}>
                            <div>
                                <div style={{ opacity: 0.4, marginBottom:'4px' }}>STATUS</div>
                                <div style={{
                                    fontSize:'12px', fontWeight:'bold',
                                    animation: phase === 'analyzing' ? 'pulse 1.5s ease-in-out infinite' : 'none',
                                }}>
                                    {phase === 'analyzing' ? 'ANALYZING SOULSTREAM...' : phase === 'result' ? 'SOUL EXTRACTED' : 'MONUMENT ERECTED'}
                                </div>
                            </div>
                            <div style={{ textAlign:'right', opacity: 0.4 }}>
                                <div>MONUMENT // {data.username?.toUpperCase() || 'UNKNOWN'}</div>
                            </div>
                        </div>
                    </div>

                    {/* Epitaph overlay - fades in when AI result arrives */}
                    {phase === 'result' && aiResult && (
                        <div style={{
                            position:'absolute', bottom:'90px', left:'50%', transform:'translateX(-50%)',
                            width:'70%', maxWidth:'500px', textAlign:'center', zIndex:4,
                            animation: 'fadeIn 1s ease-out',
                        }}>
                            <div style={{
                                border:'1px solid rgba(0,255,136,0.3)', padding:'20px 28px',
                                background:'rgba(0,0,0,0.85)', backdropFilter:'blur(12px)',
                            }}>
                                <div style={{ color:'rgba(0,255,136,0.35)', fontSize:'9px', letterSpacing:'4px', textTransform:'uppercase', marginBottom:'12px' }}>
                                    EXTRACTED EPITAPH
                                </div>
                                <div style={{
                                    color:'#00ff88', fontStyle:'italic', fontSize:'15px', lineHeight:'1.7', marginBottom:'14px',
                                }}>
                                    {`"${aiResult.epitaph}"`}
                                </div>
                                <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:'8px' }}>
                                    <span style={{ color:'rgba(0,255,136,0.4)', fontSize:'9px', letterSpacing:'3px' }}>SOUL WORD</span>
                                    <span style={{
                                        color:'#00ff88', fontSize:'11px', fontWeight:'bold',
                                        padding:'3px 10px', border:'1px solid rgba(0,255,136,0.4)',
                                        background:'rgba(0,255,136,0.08)',
                                    }}>{aiResult.word}</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CSS animations */}
                    <style>{`
                        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
                        @keyframes fadeIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
                    `}</style>
                </div>
            );
        };

        const ThreeIntroScene = ({ enabled, parallaxRef }) => {
            const mountRef = useRef(null);

            useEffect(() => {
                if (!enabled) return;
                const mount = mountRef.current;
                if (!mount) return;

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
                renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
                renderer.setSize(mount.clientWidth, mount.clientHeight, false);
                renderer.setClearColor(0x010105, 1);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                mount.appendChild(renderer.domElement);

                const scene = new THREE.Scene();
                scene.fog = new THREE.Fog(0x010105, 6, 26);

                const camera = new THREE.PerspectiveCamera(46, mount.clientWidth / mount.clientHeight, 0.1, 200);
                camera.position.set(0, 2.7, 11.3);

                // Very low ambient + cold side light for depth
                const ambient = new THREE.AmbientLight(0x00ff88, 0.06);
                scene.add(ambient);

                const coldKey = new THREE.DirectionalLight(0x9bb9ff, 0.42);
                coldKey.position.set(8, 9, -2);
                coldKey.castShadow = true;
                coldKey.shadow.mapSize.set(1024, 1024);
                coldKey.shadow.camera.near = 0.5;
                coldKey.shadow.camera.far = 30;
                coldKey.shadow.camera.left = -10;
                coldKey.shadow.camera.right = 10;
                coldKey.shadow.camera.top = 10;
                coldKey.shadow.camera.bottom = -10;
                scene.add(coldKey);

                const green = 0x00ff88;
                const glow = new THREE.PointLight(green, 1.35, 18, 2.0);
                glow.position.set(-2.5, 3.8, 4.0);
                scene.add(glow);

                // Ground plane
                const makeNoiseTexture = () => {
                    const size = 128;
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    const img = ctx.createImageData(size, size);
                    for (let i = 0; i < img.data.length; i += 4) {
                        const v = 10 + Math.floor(Math.random() * 20);
                        img.data[i + 0] = v;
                        img.data[i + 1] = v;
                        img.data[i + 2] = v + 4;
                        img.data[i + 3] = 255;
                    }
                    ctx.putImageData(img, 0, 0);
                    const tex = new THREE.CanvasTexture(canvas);
                    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                    tex.repeat.set(8, 8);
                    tex.magFilter = THREE.NearestFilter;
                    return tex;
                };
                const groundNoise = makeNoiseTexture();
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(80, 80, 1, 1),
                    new THREE.MeshStandardMaterial({
                        color: 0x02020a,
                        roughness: 1,
                        metalness: 0,
                        map: groundNoise
                    })
                );
                ground.rotation.x = -Math.PI / 2;
                ground.position.y = 0;
                ground.receiveShadow = true;
                scene.add(ground);

                // Subtle green ground glow ring (near hero)
                const makeRadialGlowTexture = () => {
                    const size = 256;
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    const g = ctx.createRadialGradient(size / 2, size / 2, 10, size / 2, size / 2, size / 2);
                    g.addColorStop(0, 'rgba(0,255,136,0.00)');
                    g.addColorStop(0.18, 'rgba(0,255,136,0.08)');
                    g.addColorStop(0.34, 'rgba(0,255,136,0.16)');
                    g.addColorStop(0.52, 'rgba(0,255,136,0.08)');
                    g.addColorStop(1, 'rgba(0,255,136,0.00)');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, size, size);
                    const tex = new THREE.CanvasTexture(canvas);
                    tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
                    return tex;
                };
                const glowTex = makeRadialGlowTexture();
                const glowRing = new THREE.Mesh(
                    new THREE.PlaneGeometry(15, 15, 1, 1),
                    new THREE.MeshBasicMaterial({
                        map: glowTex,
                        transparent: true,
                        opacity: 0.78,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                        depthTest: false
                    })
                );
                glowRing.rotation.x = -Math.PI / 2;
                // keep it near the hero base so it's always visible
                glowRing.position.set(0, 0.04, -0.3);
                glowRing.renderOrder = 10;
                scene.add(glowRing);

                // Shared acid-green material
                const stoneMat = new THREE.MeshStandardMaterial({
                    color: 0x050510,
                    roughness: 0.75,
                    metalness: 0.15,
                    emissive: green,
                    emissiveIntensity: 0.11
                });

                const accentMat = new THREE.MeshStandardMaterial({
                    color: 0x03030b,
                    roughness: 0.55,
                    metalness: 0.25,
                    emissive: green,
                    emissiveIntensity: 0.16
                });

                // Tombstone geometry builders (local to Intro scene)
                const createTombstoneGeometry = () => {
                    const shape = new THREE.Shape();
                    const w = 3.0, h = 5.0, r = 3.0;
                    shape.moveTo(-w, 0); shape.lineTo(w, 0); shape.lineTo(w, h);
                    shape.absarc(0, h, r, 0, Math.PI, false); shape.lineTo(-w, 0);
                    return new THREE.ExtrudeGeometry(shape, { depth: 1.5, bevelEnabled: true, bevelThickness: 0.15, bevelSize: 0.15 });
                };

                const createObeliskGeometry = () => {
                    const shape = new THREE.Shape();
                    shape.moveTo(-2.5, 0); shape.lineTo(2.5, 0);
                    shape.lineTo(1.8, 8); shape.lineTo(0, 11);
                    shape.lineTo(-1.8, 8); shape.lineTo(-2.5, 0);
                    return new THREE.ExtrudeGeometry(shape, { depth: 1.8, bevelEnabled: true, bevelThickness: 0.2, bevelSize: 0.2 });
                };

                const createCelticParts = (mat) => {
                    const parts = new THREE.Group();
                    const vBeam = new THREE.Mesh(new THREE.BoxGeometry(1.4, 10, 1.2), mat);
                    vBeam.position.y = 5; parts.add(vBeam);
                    const hBeam = new THREE.Mesh(new THREE.BoxGeometry(6, 1.4, 1.2), mat);
                    hBeam.position.y = 7; parts.add(hBeam);
                    const ring = new THREE.Mesh(new THREE.TorusGeometry(2.8, 0.4, 8, 24), mat);
                    ring.position.y = 7; parts.add(ring);
                    const pedestal = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 2), mat);
                    pedestal.position.y = 0.75; parts.add(pedestal);
                    return parts;
                };

                const createSlabParts = (mat) => {
                    const parts = new THREE.Group();
                    const slab = new THREE.Mesh(new THREE.BoxGeometry(6, 0.8, 10), mat);
                    slab.position.y = 0.8; parts.add(slab);
                    const bH = 0.6, bW = 0.4;
                    const front = new THREE.Mesh(new THREE.BoxGeometry(6.4, bH, bW), mat);
                    front.position.set(0, 1.5, 5); parts.add(front);
                    const back = new THREE.Mesh(new THREE.BoxGeometry(6.4, bH, bW), mat);
                    back.position.set(0, 1.5, -5); parts.add(back);
                    const left = new THREE.Mesh(new THREE.BoxGeometry(bW, bH, 10.4), mat);
                    left.position.set(-3.2, 1.5, 0); parts.add(left);
                    const right = new THREE.Mesh(new THREE.BoxGeometry(bW, bH, 10.4), mat);
                    right.position.set(3.2, 1.5, 0); parts.add(right);
                    const headShape = new THREE.Shape();
                    headShape.moveTo(-2, 0); headShape.lineTo(2, 0); headShape.lineTo(2, 3);
                    headShape.absarc(0, 3, 2, 0, Math.PI, false); headShape.lineTo(-2, 0);
                    const headGeo = new THREE.ExtrudeGeometry(headShape, { depth: 0.8, bevelEnabled: true, bevelThickness: 0.1, bevelSize: 0.1 });
                    const head = new THREE.Mesh(headGeo, mat);
                    head.rotation.y = Math.PI; head.position.set(0, 1.2, -4.5);
                    parts.add(head);
                    return parts;
                };

                const mkTomb = (style) => {
                    const group = new THREE.Group();
                    const matMain = stoneMat;
                    const matAcc = accentMat;

                    if (style === 'CLASSIC') {
                        const base = new THREE.Mesh(new THREE.BoxGeometry(7, 1.2, 3), matAcc);
                        base.position.y = 0.6;
                        group.add(base);

                        const arch = new THREE.Mesh(createTombstoneGeometry(), matMain);
                        arch.rotation.y = Math.PI;
                        arch.position.y = 1.2;
                        group.add(arch);

                        const cross = new THREE.Group();
                        const vP = new THREE.Mesh(new THREE.BoxGeometry(0.7, 2.6, 0.7), matAcc);
                        const hP = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 0.7), matAcc);
                        hP.position.y = 0.6;
                        vP.position.y = 0.9;
                        cross.add(vP);
                        cross.add(hP);
                        cross.position.set(-2.2, 2.9, 0.6);
                        group.add(cross);
                    } else if (style === 'OBELISK') {
                        const base = new THREE.Mesh(new THREE.BoxGeometry(6, 1.0, 6), matAcc);
                        base.position.y = 0.5;
                        group.add(base);

                        const pillar = new THREE.Mesh(createObeliskGeometry(), matMain);
                        pillar.position.y = 5.7;
                        group.add(pillar);
                    } else if (style === 'CELTIC') {
                        const base = new THREE.Mesh(new THREE.BoxGeometry(5.5, 1.0, 5.5), matAcc);
                        base.position.y = 0.5;
                        group.add(base);

                        const parts = createCelticParts(matMain);
                        parts.position.set(0, 5.0, 0);
                        group.add(parts);
                    } else {
                        const parts = createSlabParts(matMain);
                        parts.position.set(0, 0, 0);
                        group.add(parts);
                    }

                    // Slight bevel-like outline via scale + emissive pulse
                    group.traverse((obj) => {
                        if (obj.isMesh) {
                            obj.castShadow = true;
                            obj.receiveShadow = true;
                        }
                    });
                    return group;
                };

                // Hero obelisk (near, centered)
                const hero = mkTomb('CELTIC');
                hero.position.set(-6, -3, -0.5);
                hero.rotation.y = 0.6;
                hero.scale.setScalar(0.60);
                scene.add(hero);

                // Optional silhouettes (far, minimal)
                const far1 = mkTomb('SLAB');
                far1.position.set(1.5, 0, -2.5);
                far1.rotation.y = -0.2;
                far1.rotation.x = 0;
                far1.scale.setScalar(0.60);
                far1.traverse((o) => { if (o.isMesh) o.material = stoneMat; });
                scene.add(far1);

                const far2 = mkTomb('OBELISK');
                far2.position.set(-2, -6, -9.8);
                far2.rotation.y = 0;
                far2.rotation.x = 0;
                far2.scale.setScalar(0.9);
                far2.traverse((o) => { if (o.isMesh) o.material = stoneMat; });
                scene.add(far2);

                // particles (lightweight)
                const pCount = 180;
                const positions = new Float32Array(pCount * 3);
                const velocities = new Float32Array(pCount * 3);
                for (let i = 0; i < pCount; i++) {
                    positions[i * 3 + 0] = (Math.random() - 0.5) * 26;
                    positions[i * 3 + 1] = Math.random() * 5.5 + 0.35;
                    positions[i * 3 + 2] = -Math.random() * 14 - 2.0;
                    velocities[i * 3 + 0] = (Math.random() - 0.5) * 0.012;
                    velocities[i * 3 + 1] = Math.random() * 0.01 + 0.004;
                    velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.01;
                }
                const pGeo = new THREE.BufferGeometry();
                pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const pMat = new THREE.PointsMaterial({
                    color: 0x88ffaa,
                    size: 0.09,
                    transparent: true,
                    opacity: 0.32,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });
                const pts = new THREE.Points(pGeo, pMat);
                scene.add(pts);

                let raf = 0;
                const start = performance.now();

                const onResize = () => {
                    if (!mount) return;
                    const w = mount.clientWidth;
                    const h = mount.clientHeight;
                    renderer.setSize(w, h, false);
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                };
                window.addEventListener('resize', onResize);

                const tick = () => {
                    const t = (performance.now() - start) / 1000;
                    // very slow ritual drift (forward/back + slight sway)
                    const px = (parallaxRef?.current?.x || 0);
                    const py = (parallaxRef?.current?.y || 0);
                    camera.position.x = Math.sin(t * 0.07) * 0.45 + px * 0.55;
                    camera.position.y = 2.55 + Math.sin(t * 0.05) * 0.06 + py * 0.18;
                    camera.position.z = 11.1 + Math.cos(t * 0.06) * 0.35;
                    camera.lookAt(px * 0.35, 2.35 + py * 0.15, -4.2);

                    glow.intensity = 1.15 + Math.sin(t * 0.65) * 0.08;
                    stoneMat.emissiveIntensity = 0.105 + (Math.sin(t * 0.35) * 0.008);
                    accentMat.emissiveIntensity = 0.155 + (Math.cos(t * 0.33) * 0.01);
                    glowRing.material.opacity = 0.72 + (Math.sin(t * 0.45) * 0.06);

                    // particle drift (subtle breathing)
                    const arr = pGeo.attributes.position.array;
                    for (let i = 0; i < pCount; i++) {
                        const idx = i * 3;
                        arr[idx + 0] += velocities[idx + 0];
                        arr[idx + 1] += velocities[idx + 1] * (0.65 + 0.35 * Math.sin(t * 0.3 + i));
                        arr[idx + 2] += velocities[idx + 2];
                        if (arr[idx + 1] > 7.2) arr[idx + 1] = 0.35;
                        if (arr[idx + 0] > 13) arr[idx + 0] = -13;
                        if (arr[idx + 0] < -13) arr[idx + 0] = 13;
                        if (arr[idx + 2] > -0.5) arr[idx + 2] = -16.5;
                        if (arr[idx + 2] < -17) arr[idx + 2] = -2.2;
                    }
                    pGeo.attributes.position.needsUpdate = true;

                    renderer.render(scene, camera);
                    raf = requestAnimationFrame(tick);
                };
                raf = requestAnimationFrame(tick);

                return () => {
                    cancelAnimationFrame(raf);
                    window.removeEventListener('resize', onResize);
                    try { mount.removeChild(renderer.domElement); } catch (e) {}
                    renderer.dispose();
                    pGeo.dispose();
                    pMat.dispose();
                    glowTex.dispose?.();
                    groundNoise.dispose?.();
                };
            }, [enabled]);

            return <div ref={mountRef} className="absolute inset-0" />;
        };

        const IntroScreen = ({ onEnter }) => {
            const [isLeaving, setIsLeaving] = useState(false);
            const parallaxRef = useRef({ x: 0, y: 0 });

            const handleEnter = () => {
                if (isLeaving) return;
                setIsLeaving(true);
                setTimeout(() => onEnter?.(), 800);
            };

            return (
                <div
                    className={`fixed inset-0 z-[400] ${isLeaving ? 'pointer-events-none' : ''}`}
                    style={{
                        opacity: isLeaving ? 0 : 1,
                        transition: 'opacity 0.8s ease'
                    }}
                    onMouseMove={(e) => {
                        const nx = (e.clientX / window.innerWidth) * 2 - 1;
                        const ny = (e.clientY / window.innerHeight) * 2 - 1;
                        parallaxRef.current.x = nx;
                        parallaxRef.current.y = -ny;
                    }}
                >
                    <ThreeIntroScene enabled={!isLeaving} parallaxRef={parallaxRef} />

                    {/* Subtle scanline + flicker */}
                    <div className="absolute inset-0 pointer-events-none" style={{ opacity: 0.9, animation: 'dnIntroFlicker 8s ease-in-out infinite' }}>
                        <div className="absolute inset-0" style={{
                            background: 'radial-gradient(900px 520px at 50% 45%, rgba(0,255,136,0.10), rgba(1,1,5,0.88) 62%, rgba(1,1,5,1) 100%)',
                            opacity: 1
                        }} />
                        <div className="absolute inset-0" style={{
                            background: 'repeating-linear-gradient(180deg, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, rgba(0,0,0,0) 3px, rgba(0,0,0,0) 6px)',
                            opacity: 0.08,
                            mixBlendMode: 'overlay',
                            animation: 'dnIntroScan 10s linear infinite'
                        }} />
                    </div>

                    {/* UI overlay */}
                    <div className="absolute inset-0 flex items-center justify-center p-6">
                        <div className="w-full max-w-[920px] pointer-events-auto text-center">
                            <div className="text-[0.55rem] text-[#00ff88]/50 uppercase tracking-[0.8em] font-black mb-6">
                                // RITUAL GATE
                            </div>
                            <h1
                                className="text-5xl md:text-6xl tracking-[-0.06em] text-[#00ff88] uppercase italic leading-none"
                                style={{ textShadow: '0 0 22px rgba(0,255,136,0.22)' }}
                            >
                                <span className="font-thin">Digital</span> <span className="font-black">Necropolis</span>
                            </h1>

                            <div className="mt-8 space-y-3">
                                <div className="text-white/80 text-sm md:text-base leading-relaxed font-medium italic">
                                   
                                </div>
                                <div className="text-[#88ffaa]/60 text-[0.8rem] md:text-sm leading-relaxed font-mono">
                                    
                                </div>
                                <div className="pt-3 text-white/35 text-[0.65rem] md:text-[0.7rem] uppercase tracking-[0.45em] font-black dn-hint-mono">
                                  Not deleted, just buried.
                                  
                                </div>
                                <div className="text-[#88ffaa]/35 text-[0.65rem] md:text-[0.7rem] uppercase tracking-[0.45em] font-black dn-hint-mono">
                                    We hope you can Wander. Remember. and Let go.
                                  
                                    
                                </div>
                                <div className="text-[#88ffaa]/35 text-[0.65rem] md:text-[0.7rem] uppercase tracking-[0.45em] font-black dn-hint-mono">
                                  
                                    Leave a trace. Or speak to ghosts.
                                    
                                </div>
                            </div>

                            <div className="mt-10 flex items-center justify-center">
                                <button
                                    onClick={handleEnter}
                                    className="dn-enter-btn uppercase font-black tracking-[0.45em] text-[0.65rem] md:text-[0.7rem] px-10 py-4 border border-[#00ff88]/60 text-[#00ff88] bg-transparent transition-all"
                                >
                                    ENTER THE NECROPOLIS
                                </button>
                            </div>
                        </div>
                    </div>

                    <style>{`
                        @keyframes dnIntroScan {
                            0% { transform: translateY(-4%); opacity: 0.14; }
                            50% { opacity: 0.22; }
                            100% { transform: translateY(4%); opacity: 0.14; }
                        }
                        @keyframes dnIntroFlicker {
                            0%,100% { opacity: 1; }
                            50% { opacity: 0.985; }
                        }
                        .dn-enter-btn{
                            position: relative;
                            transform: translateZ(0);
                            box-shadow: 0 0 16px rgba(0,255,136,0.10);
                            transition: transform 220ms cubic-bezier(0.2,0.8,0.2,1),
                                        box-shadow 220ms ease,
                                        border-color 220ms ease,
                                        color 220ms ease,
                                        background-color 220ms ease,
                                        filter 220ms ease;
                        }
                        .dn-enter-btn::before{
                            content:'';
                            position:absolute;
                            inset:-2px;
                            border-radius:1px;
                            background: radial-gradient(600px 160px at 50% 50%, rgba(0,255,136,0.22), rgba(0,0,0,0) 70%);
                            opacity:0;
                            transition: opacity 220ms ease;
                            pointer-events:none;
                        }
                        .dn-enter-btn::after{
                            content:'';
                            position:absolute;
                            inset:0;
                            background: linear-gradient(90deg, rgba(0,255,136,0.00), rgba(0,255,136,0.14), rgba(0,255,136,0.00));
                            transform: translateY(115%);
                            opacity:0;
                            transition: transform 260ms cubic-bezier(0.2,0.8,0.2,1), opacity 220ms ease;
                            pointer-events:none;
                        }
                        .dn-enter-btn:hover{
                            transform: scale(1.05);
                            border-color: rgba(0,255,136,0.95);
                            box-shadow: 0 0 28px rgba(0,255,136,0.22);
                            filter: brightness(1.05);
                        }
                        .dn-enter-btn:hover::before{ opacity: 1; }
                        .dn-enter-btn:hover::after{ transform: translateY(0%); opacity: 0.85; }
                        .dn-enter-btn:active{
                            transform: scale(0.98);
                            box-shadow: 0 0 18px rgba(0,255,136,0.16);
                        }
                    `}</style>
                </div>
            );
        };

        const App = () => {
            const [entered, setEntered] = useState(false);
            const [tombstones, setTombstones] = useState([]);
            const [hoveredId, setHoveredId] = useState(null);
            const [selectedId, setSelectedId] = useState(null);
            const [focusTarget, setFocusTarget] = useState(null);
            const [isCreateModalOpen, setCreateModalOpen] = useState(false);
            const [isChatModalOpen, setChatModalOpen] = useState(false);
            const [isAuthModalOpen, setAuthModalOpen] = useState(false);
            const [user, setUser] = useState(null);
            const [pendingTombstone, setPendingTombstone] = useState(null);

            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    if (currentUser) {
                        const docRef = doc(db, "users", currentUser.uid);
                        let docSnap;
                        try {
                            docSnap = await getDoc(docRef);
                        } catch (error) {
                            handleFirestoreError(error, OperationType.GET, `users/${currentUser.uid}`);
                        }
                        if (docSnap.exists()) {
                            setUser({ ...currentUser, ...docSnap.data() });
                        } else {
                            setUser(currentUser);
                        }
                    } else {
                        setUser(null);
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleLogout = async () => {
                try {
                    await signOut(auth);
                } catch (err) {
                    console.error("Logout error:", err);
                }
            };

            useEffect(() => {
                const q = query(collection(db, "graves"), orderBy("createdAt", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const graves = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setTombstones(graves);
                }, (error) => {
                    handleFirestoreError(error, OperationType.LIST, "graves");
                });
                return () => unsubscribe();
            }, []);

            const handleSelect = (id) => { setSelectedId(id); const t = tombstones.find(x => x.id === id); if (t) setFocusTarget({ x: t.x, z: t.z }); };
            const handleManualMove = () => { if (focusTarget || selectedId) { setFocusTarget(null); setSelectedId(null); } };
            
            const [aiResult, setAiResult] = useState(null);
            const [animationDone, setAnimationDone] = useState(false);

            const handleCreateTombstone = async (data) => {
                if (!user) {
                    setAuthModalOpen(true);
                    return;
                }
                // Close modal, show animation, start API call simultaneously
                setCreateModalOpen(false);
                setAnimationDone(false);
                setAiResult(null);
                setPendingTombstone(data);

                // Call AI API in parallel with animation
                try {
                    const result = await transformArtifactToEpitaph(data.content, data.filesData || []);
                    if (result.word === "VOID" && result.epitaph.includes("matrix is congested")) {
                        // API error - cancel animation, reopen modal
                        setPendingTombstone(null);
                        setCreateModalOpen(true);
                        return;
                    }
                    // Feed AI result to animation overlay
                    setAiResult(result);
                } catch (err) {
                    // Never let the animation hang forever
                    setAiResult({
                        epitaph: handleApiError(err),
                        word: "VOID",
                        color: "#00ff88",
                        keywords: ["LOST SIGNAL"]
                    });
                }
            };

            const handleAnimationComplete = () => {
                setAnimationDone(true);
            };

            // When animation signals done (after showing epitaph), save to Firestore
            useEffect(() => {
                if (!animationDone || !pendingTombstone || !aiResult || !user) return;
                const formData = pendingTombstone;
                const result = aiResult;
                setPendingTombstone(null);
                setAiResult(null);
                setAnimationDone(false);
                const pos = getRandomPosition(tombstones, 1200, 50);
                (async () => {
                    try {
                        const safeThemeColor = clampThemeColor(result.color || '#00ff88', 0.58, 0.46);
                        const docRef = await addDoc(collection(db, "graves"), {
                            userId: user.uid,
                            username: user.username || formData.username,
                            name: formData.username,
                            platform: formData.platform || 'LOCAL',
                            era: formData.era || 'CYBER',
                            epitaph: result.epitaph,
                            representativeWord: result.word,
                            themeColor: safeThemeColor,
                            chatHistory: [],
                            x: pos.x,
                            z: pos.z,
                            burialType: formData.burialType,
                            tombstoneStyle: formData.tombstoneStyle || 'CLASSIC',
                            originalContent: formData.content,
                            keywords: result.keywords || [],
                            createdAt: serverTimestamp()
                        });
                        setSelectedId(docRef.id);
                        setFocusTarget({ x: pos.x, z: pos.z });
                    } catch (err) {
                        handleFirestoreError(err, OperationType.CREATE, "graves");
                    }
                })();
            }, [animationDone, pendingTombstone, aiResult, user]);

            const handleDeleteGrave = async (id) => {
                try {
                    await deleteDoc(doc(db, "graves", id));
                    if (selectedId === id) {
                        setSelectedId(null);
                        setFocusTarget(null);
                    }
                } catch (err) {
                    handleFirestoreError(err, OperationType.DELETE, `graves/${id}`);
                }
            };

            const handleSendMessage = async (userText) => {
                const currentGhost = tombstones.find(t => t.id === selectedId);
                if (!currentGhost) return;
                const userMsg = { role: 'user', text: userText };
                const updatedWithUser = [...(currentGhost.chatHistory || []), userMsg];
                setTombstones(prev => prev.map(t => t.id === selectedId ? { ...t, chatHistory: updatedWithUser } : t));
                const ghostAck = await generateGhostResponse(currentGhost, userText, updatedWithUser);
                // ghostAck is now { message, emotion }
                const ghostMsg = { role: 'ghost', text: ghostAck.message, emotion: ghostAck.emotion };
                setTombstones(prev => prev.map(t => t.id === selectedId ? { ...t, chatHistory: [...updatedWithUser, ghostMsg] } : t));
            };

            const hoveredT = tombstones.find(t => t.id === hoveredId) || null;
            const selectedT = tombstones.find(t => t.id === selectedId) || null;

            return (
                <div className="bg-[#010105] w-screen h-screen">
                    {!entered && <IntroScreen onEnter={() => setEntered(true)} />}
                    <div
                        className={`w-full h-full ${entered ? 'pointer-events-auto' : 'pointer-events-none'}`}
                        style={{
                            opacity: entered ? 1 : 0,
                            transition: 'opacity 0.8s ease'
                        }}
                    >
                    <ThreeScene tombstones={tombstones} onHover={setHoveredId} onClick={handleSelect} onManualMove={handleManualMove} focusTarget={focusTarget} />
                    <UIOverlay 
                        tombstones={tombstones} 
                        hoveredTombstone={hoveredT}
                        selectedTombstone={selectedT}
                        onOpenCreate={() => setCreateModalOpen(true)}
                        onOpenChat={() => setChatModalOpen(true)}
                        onCloseSelection={() => { setSelectedId(null); setFocusTarget(null); }}
                        onSelectTombstone={handleSelect}
                        user={user}
                        onOpenAuth={() => setAuthModalOpen(true)}
                        onLogout={handleLogout}
                        onDeleteGrave={handleDeleteGrave}
                    />
                    {isCreateModalOpen && <CreateTombstoneModal onClose={() => setCreateModalOpen(false)} onSubmit={handleCreateTombstone} />}
                    {pendingTombstone && <TombstoneGenerationAnimation data={pendingTombstone} aiResult={aiResult} onComplete={handleAnimationComplete} />}
                    {isChatModalOpen && selectedT && <GhostChatModal persona={selectedT} onClose={() => setChatModalOpen(false)} onSendMessage={handleSendMessage} />}
                    {isAuthModalOpen && <AuthModal onClose={() => setAuthModalOpen(false)} />}
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>

</body></html>
